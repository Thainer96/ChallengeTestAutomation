serenity {
  project.name = "OpenCart - Flujo de Compra E2E"
  take.screenshots = AFTER_EACH_STEP
  test.root = "opencart"
}

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-notifications", "--remote-allow-origins=*"]
    }
  }
}

headless.mode = false

environments {
  default {
    base.url = "http://opencart.abstracta.us/"
  }
  qa {
    base.url = "http://opencart.abstracta.us/"
  }
}
