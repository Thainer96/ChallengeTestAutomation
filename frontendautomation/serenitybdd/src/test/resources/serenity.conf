serenity {
  project.name = "OpenCart - Flujo de Compra E2E"
  take.screenshots = AFTER_EACH_STEP
  test.root = "opencart"
}

webdriver {
  driver = ${browser}
  autodownload = true
}

headless.mode = false

drivers {
  chrome {
    capabilities {
      browserName = "chrome"
      "goog:chromeOptions" {
        args = ["--start-maximized", "--disable-notifications", "--remote-allow-origins=*", "--ignore-certificate-errors"]
      }
    }
  }
  firefox {
    capabilities {
      browserName = "firefox"
      "moz:firefoxOptions" {
        args = ["-width=1920", "-height=1080"]
      }
    }
  }
  edge {
    capabilities {
      browserName = "MicrosoftEdge"
      "ms:edgeOptions" {
        args = ["--start-maximized", "--disable-notifications", "--ignore-certificate-errors"]
      }
    }
  }
}

environments {
  default {
    base.url = "http://opencart.abstracta.us/"
    browser = chrome
  }
  qa {
    base.url = "http://opencart.abstracta.us/"
    browser = chrome
  }
}
